<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Materiais</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #c0392b;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .subtitulo {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #444;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
        }
        input:focus { border-color: #c0392b; }
        button {
            width: 100%;
            padding: 12px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover { background: #a93226; }
        .resultado {
            margin-top: 30px;
            background: #fdf2f2;
            border-left: 4px solid #c0392b;
            border-radius: 8px;
            padding: 20px;
        }
        .resultado h2 {
            color: #c0392b;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .resultado p {
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
        }
        .resultado span {
            font-weight: bold;
            color: #c0392b;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Calculadora de Materiais</h1>
    <p class="subtitulo">Preencha os dados da obra para gerar o orçamento</p>

    <label>Nome do Cliente</label>
    <input type="text" id="nomeCliente" placeholder="Ex: João Silva">

    <label>Comprimento da Parede (m)</label>
    <input type="number" id="comprimentoParede" value="5.0" step="0.1">

    <label>Altura da Parede (m)</label>
    <input type="number" id="alturaParede" value="2.8" step="0.1">

    <label>Altura da Viga (m)</label>
    <input type="number" id="alturaViga" value="0.3" step="0.1">

    <label>Espessura da Viga (m)</label>
    <input type="number" id="espessuraViga" value="0.2" step="0.1">

    <label>Percentual de Perda (%)</label>
    <input type="number" id="percentualPerda" value="10.0" step="0.1">

    <button onclick="calcular()">Calcular Orçamento</button>

    <div id="resultado" class="resultado" style="display:none">
        <h2>Resultado do Orçamento</h2>
        <p>Volume de Concreto: <span id="volConcreto"></span> m³</p>
        <p>Quantidade de Tijolos: <span id="qtdTijolos"></span> un</p>
    </div>
</div>
<script>
    async function calcular() {
        const arestas = [{
            id: "a1",
            verticeOrigem: "V1",
            verticeDestino: "V2",
            comprimento: parseFloat(document.getElementById('comprimentoParede').value),
            espessura: parseFloat(document.getElementById('espessuraViga').value),
            alturaParede: parseFloat(document.getElementById('alturaParede').value),
            possuiPorta: false,
            alturaPorta: 0.0,
            larguraPorta: 0.0,
            possuiJanela: false,
            alturaJanela: 0.0,
            larguraJanela: 0.0
        }];
        const concretoResp = await fetch('/api/materiais/concreto', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({arestas, alturaViga: parseFloat(document.getElementById('alturaViga').value)})
        });
        const concreto = await concretoResp.json();
        const tijoloResp = await fetch('/api/materiais/tijolos', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                arestas,
                alturaTijolo: 0.09,
                larguraTijolo: 0.14,
                percentualPerda: parseFloat(document.getElementById('percentualPerda').value)
            })
        });
        const tijolo = await tijoloResp.json();
        document.getElementById('volConcreto').textContent = concreto.volumeTotal;
        document.getElementById('qtdTijolos').textContent = tijolo.quantidadeTijolosComPerda;
        document.getElementById('resultado').style.display = 'block';
    }
</script>
</body>
</html>
